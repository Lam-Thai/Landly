name: E2E (Playwright)

on:
  pull_request:
    branches: [main]

# This runs automatically on every PR to main

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run test:e2e

